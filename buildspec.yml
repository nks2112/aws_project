version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 231726701291.dkr.ecr.ap-south-1.amazonaws.com
      - REPOSITORY_URI=231726701291.dkr.ecr.ap-south-1.amazonaws.com/my-app
      - IMAGE_TAG=latest

  build:
    commands:
      - echo Build started
      - docker build -t my-app .
      - docker tag my-app:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - printf '[{"name":"my-app-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
